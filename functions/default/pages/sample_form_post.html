<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample AirTable Submit via Form Post</title>
    <link rel="icon" href="data:," />

    <script async defer>
      window.addEventListener("DOMContentLoaded", () => {
        var recaptchaSiteKey = "6Lcf3GYjAAAAAGPae1QeEf0jJ8xjTwrwPAHOhZIJ"; // Set this to your recaptcha site key
        //var formPostServiceUrl = "https://fa-cdt-pub-migr-betaws-w-p-001-stage.azurewebsites.net/api/v2"; // Dev Form Post Service URL
        var formPostServiceUrl = "http://localhost:12345/api/v2"; // Local Host Service URL

        /** @type {HTMLFormElement} */
        const form = document.getElementById("mySampleForm");
        form.action = formPostServiceUrl;
        form.method = "POST";

        function recaptchaCallback() {
          // Callback that directly uses a FORM POST to submit the form data to the form post service after successful reCAPTCHA validation.
          form.submit();
        } // End of recaptchaCallback function

        async function submitForm(/** @type { SubmitEvent } */ e) {
          e.preventDefault(); // stop native submission for a moment

          /** @type {HTMLButtonElement} */
          const formSubmitButton = form.querySelector("input[type=submit]");
          formSubmitButton.disabled = true; // disable submit button to prevent multiple clicks

          grecaptcha.execute().then(recaptchaCallback);

          // No clear way to detect form submission when using native form post, so we will use a timeout as a fallback to re-enable the submit button in case of issues, and also to alert the user of success since we won't get a response back from the server in this case. In a real implementation, you would want to handle this more elegantly.
          let navigated = false;
          const handler = () => { navigated = true; };
          window.addEventListener("pagehide", handler);

          setTimeout(() => {
            formSubmitButton.disabled = false; // re-enable submit button after submission

            if (!navigated) {
              alert("Form submission Success.");
            }
          }, 5000);
        } // End of submitForm function

        // Dynamically add the invisible reCAPTCHA v3 button to the form.
        if (!document.querySelector(".g-recaptcha")) {
          const recaptchaButton = document.createElement("button");
          recaptchaButton.hidden = true;
          recaptchaButton.setAttribute("data-sitekey", recaptchaSiteKey);
          recaptchaButton.classList.add("g-recaptcha");
          form.appendChild(recaptchaButton);
          form.addEventListener("submit", submitForm);
        }
      });
    </script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <main>
      <h1>Sample AirTable Submit via Form Post</h1>
      <form autocomplete="on" id="mySampleForm">
        <p>
          <label for="InputName">Your name</label>
          <input
            autofocus
            type="text"
            id="InputName"
            name="My Name"
            autocomplete="name"
            required
            size="65"
            maxlength="150"
            minlength="1"
            value="Test Name" />
        </p>
        <p>
          <label for="InputNumber">A Number</label>
          <input
            type="number"
            id="InputNumber"
            name="My Number"
            required
            value="12345" />
        </p>
        <p>
          <label for="InputEmail">Email</label>
          <input
            type="email"
            id="InputEmail"
            name="My Email"
            autocomplete="email"
            required
            size="65"
            maxlength="250"
            minlength="1"
            value="test@test.com" />
        </p>
        <p>
          <label for="InputDate">Date</label>
          <input
            type="date"
            id="InputDate"
            name="My Date"
            required
            value="2024-06-01" />
        </p>
        <p>
          <label for="InputOption">Select an option</label>
          <select id="InputOption" name="My Option" required>
            <option value="">Select an option</option>
            <option value="Option 1" selected>Option 1</option>
            <option value="Option 2">Option 2</option>
            <option value="Option 3">Option 3</option>
            <option value="Invalid">Invalid</option>
          </select>
        </p>
        <input type="submit" />
      </form>
    </main>
  </body>
</html>
