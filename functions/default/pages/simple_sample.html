<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Sample AirTable Submit</title>
    <link rel="icon" href="data:," />
  </head>

  <body>
    <script src="https://www.google.com/recaptcha/api.js" defer></script>
    <script>
      const serviceUrl = "https://fa-cdt-pub-migr-betaws-w-p-001-stage.azurewebsites.net/api/v2";
      //const serviceUrl = "http://localhost:12345/api/v2";

      const siteKey = "6Lcf3GYjAAAAAGPae1QeEf0jJ8xjTwrwPAHOhZIJ"; // Set this to your recaptch site key
    </script>

    <div>
      <div>
        <h1>Contact us</h1>
        <p>
          Have a question? Contact us for help with general inquiries, feedback,
          or bugs.
        </p>
        <div>
          <div>
            <form
              autocomplete="on"
              method="POST"
              id="ContactUsForm"
              role="form">
              <label for="InputName"> Your name </label>
              <input
                autofocus
                type="text"
                class="form-control rounded-5"
                id="InputName"
                name="My Name"
                autocomplete="name"
                required
                aria-required="true"
                size="65"
                maxlength="150"
                minlength="1"
                role="textbox"
                value="Test Name" />
              <div class="mt-2 invalid-feedback font-weight-600 d-block">
                Enter your name
              </div>

              <label for="InputNumber"> A Number </label>
              <input
                type="number"
                class="form-control rounded-5"
                id="InputNumber"
                name="My Number"
                required
                aria-required="true"
                role="textbox"
                value="12345" />
              <div class="mt-2 invalid-feedback font-weight-600 d-block">
                Enter a number
              </div>

              <label for="InputEmail"> Email </label>
              <input
                type="email"
                class="form-control rounded-5"
                id="InputEmail"
                name="My Email"
                autocomplete="email"
                required
                aria-required="true"
                size="65"
                maxlength="250"
                minlength="1"
                role="textbox"
                value="test@test.com" />
              <div class="mt-2 invalid-feedback font-weight-600 d-block">
                Enter a valid email. Example: name@email.com
              </div>

              <label for="InputDate"> Date </label>
              <input
                type="date"
                class="form-control rounded-5"
                id="InputDate"
                name="My Date"
                autocomplete="bday"
                required
                aria-required="true"
                role="textbox"
                value="2024-06-01" />
              <div class="mt-2 invalid-feedback font-weight-600 d-block">
                Enter a valid date.
              </div>

              <label for="InputOption"> Select an option </label>

              <select id="InputOption" name="My Option">
                <option value="">Select an option</option>
                <option value="Option 1" selected>Option 1</option>
                <option value="Option 2">Option 2</option>
                <option value="Option 3">Option 3</option>
                <option value="Invalid">Invalid</option>
              </select>

              <input type="submit" value="Submit" />

              <button
                class="g-recaptcha"
                data-sitekey=""
                data-callback="recaptchaCallback"
                data-action="submit"></button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener("load", () => {
        getForm().addEventListener("submit", submitForm);
        getSubmitButton().addEventListener("click", () =>
          getForm().setAttribute("submit_attempted", "")
        );
      });

      function getRecaptcha() {
         return /** @type { HTMLButtonElement } */ (
          getForm().querySelector("button.g-recaptcha")
        );
      }

      function getForm() {
        return /** @type {HTMLFormElement} */ (
          document.getElementById("ContactUsForm")
        );
      }

      function getSubmitButton() {
        return /** @type { HTMLButtonElement } */ (
          getForm().querySelector("input[type=submit]")
        );
      }

      getRecaptcha().dataset.sitekey = siteKey;

      function triggerRecaptcha() {
        getRecaptcha().click(); //will trigger recaptchaCallback when complete
      }

      async function submitForm(/** @type { SubmitEvent } */ e) {
        e.preventDefault();

        getSubmitButton().disabled = true;
        setTimeout(() => (getSubmitButton().disabled = false), 5000);

        triggerRecaptcha();
      }

      function recaptchaCallback() {
        /** @type { RequestInit } */
        const request = {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify([...new FormData(getForm())]),
        };

        fetch(serviceUrl, request)
          .then(async response => {
            if (response.ok) {
              console.log("Form submitted successfully");
              alert("Form submitted successfully!");
              return;
            }

            throw new Error(JSON.stringify(await response.json()));
          })
          .catch(error => {
            console.error(error);
            alert("Form submission failed. See console for details.");
          });
      }
    </script>
  </body>
</html>
