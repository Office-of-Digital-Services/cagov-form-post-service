<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Sample AirTable Submit</title>
    <link rel="icon" href="data:," />

    <script async defer>
      var recaptchaSiteKey = "6Lcf3GYjAAAAAGPae1QeEf0jJ8xjTwrwPAHOhZIJ"; // Set this to your recaptcha site key
        //var formPostServiceUrl = "https://fa-cdt-pub-migr-betaws-w-p-001-stage.azurewebsites.net/api/v2"; // Dev Form Post Service URL
      var formPostServiceUrl = "http://localhost:12345/api/v2"; // Local Host Service URL

      window.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("mySampleForm");
        form.action = formPostServiceUrl;
        form.method = "POST";
        const formSubmitButton = form.querySelector("input[type=submit]");

        if (!document.querySelector(".g-recaptcha")) {
          const recaptchaButton = document.createElement("button");
          recaptchaButton.type = "button";
          recaptchaButton.hidden = true;
          recaptchaButton.setAttribute("data-sitekey", recaptchaSiteKey);
          recaptchaButton.setAttribute("data-action", "submit");
          recaptchaButton.classList.add("g-recaptcha");
          document.body.appendChild(recaptchaButton);

          const recaptchaTokenInput = document.createElement("input");
          recaptchaTokenInput.type = "hidden";
          recaptchaTokenInput.name = "g-recaptcha-response";
          form.appendChild(recaptchaTokenInput);

          form.addEventListener("submit", function (e) {
            e.preventDefault(); // stop native submission for a moment

            formSubmitButton.disabled = true; // disable submit button to prevent multiple clicks
            setTimeout(() => {
              formSubmitButton.disabled = false; // re-enable submit button after submission
            }, 5000);

            grecaptcha.execute().then(function(token) {
              recaptchaTokenInput.value = token;

              form.submit();
            });
          });
        }
      });
    </script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <main>
      <h1>Simple Sample Form with HTML5 validators</h1>
      <form autocomplete="on" id="mySampleForm">
        <p>
          <label for="InputName">Your name</label>
          <input
            autofocus
            type="text"
            id="InputName"
            name="My Name"
            autocomplete="name"
            required
            size="65"
            maxlength="150"
            minlength="1"
            value="Test Name" />
        </p>
        <p>
          <label for="InputNumber">A Number</label>
          <input
            type="number"
            id="InputNumber"
            name="My Number"
            required
            value="12345" />
        </p>
        <p>
          <label for="InputEmail">Email</label>
          <input
            type="email"
            id="InputEmail"
            name="My Email"
            autocomplete="email"
            required
            size="65"
            maxlength="250"
            minlength="1"
            value="test@test.com" />
        </p>
        <p>
          <label for="InputDate">Date</label>
          <input
            type="date"
            id="InputDate"
            name="My Date"
            required
            value="2024-06-01" />
        </p>
        <p>
          <label for="InputOption">Select an option</label>
          <select id="InputOption" name="My Option">
            <option value="">Select an option</option>
            <option value="Option 1" selected>Option 1</option>
            <option value="Option 2">Option 2</option>
            <option value="Option 3">Option 3</option>
            <option value="Invalid">Invalid</option>
          </select>
        </p>
        <input type="submit" value="Submit" />
      </form>
    </main>
  </body>
</html>
