<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample AirTable Submit via Fetch</title>
    <link rel="icon" href="data:," />

    <script>
      function submitForm(/** @type { SubmitEvent } */ e) {
        e.preventDefault();

        //const formPostServiceUrl = "https://fa-cdt-pub-migr-betaws-w-p-001-stage.azurewebsites.net/api/v2"; // Dev Form Post Service URL
        const formPostServiceUrl = "http://localhost:12345/api/v2/airtable/sample/appXfKtM85FrT0Ipc/tblrWC8qRNId3mSaL"; // Local Host Service URL
        const redirectSuccessUrl = "/success";
        const redirectErrorUrl = "/error?error_message=";

        e.submitter.disabled = true; // disable submit button to prevent multiple clicks

        grecaptcha.execute().then(() => {
          // Callback that uses FETCH API to submit the form data to the form post service after successful reCAPTCHA validation.

          /** @type { RequestInit } */
          const request = {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify([...new FormData(e.target)]) // Convert form data to JSON
          };

          fetch(formPostServiceUrl, request)
            .then(async response => {
              if (response.ok) {
                console.log("Form submitted successfully");
                alert("Form submitted successfully");
                window.location.href = redirectSuccessUrl;
                return;
              }

              throw new Error(await response.text());
            })
            .catch(error => {
              console.error(error);
              alert("Form submission failed. See console for details.");
              window.location.href = redirectErrorUrl + encodeURIComponent(error.message);
            })
            .finally(() => { e.submitter.disabled = false; });
        });
      } // End of submitForm function
    </script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <main>
      <h1>Sample AirTable Submit via Fetch</h1>
      <form autocomplete="on" onsubmit="submitForm(event)">
        <!-- #region Required Elements to support Form Post Service-->
        <!-- 
        hidden g-recaptcha element required to support Google reCAPTCHA v3 
        update the data-sitekey value with your own reCAPTCHA site key. You can obtain a site key by registering your site at https://www.google.com/recaptcha/admin/create
        -->
        <input
          type="button"
          hidden=""
          data-sitekey="6Lcf3GYjAAAAAGPae1QeEf0jJ8xjTwrwPAHOhZIJ"
          class="g-recaptcha" />

        <!-- #endregion Required Elements to support Form Post Service -->

        <p>
          <label for="InputName">Your name</label>
          <input
            autofocus
            type="text"
            id="InputName"
            name="My Name"
            autocomplete="name"
            required
            size="65"
            maxlength="150"
            minlength="1"
            value="Test Name" />
        </p>
        <p>
          <label for="InputNumber">A Number</label>
          <input
            type="number"
            id="InputNumber"
            name="My Number"
            required
            value="12345" />
        </p>
        <p>
          <label for="InputEmail">Email</label>
          <input
            type="email"
            id="InputEmail"
            name="My Email"
            autocomplete="email"
            required
            size="65"
            maxlength="250"
            minlength="1"
            value="test@test.com" />
        </p>
        <p>
          <label for="InputDate">Date</label>
          <input
            type="date"
            id="InputDate"
            name="My Date"
            required
            value="2024-06-01" />
        </p>
        <p>
          <label for="InputOption">Select an option</label>
          <select id="InputOption" name="My Option" required>
            <option value="">Select an option</option>
            <option value="Option 1" selected>Option 1</option>
            <option value="Option 2">Option 2</option>
            <option value="Option 3">Option 3</option>
            <option value="Invalid">Invalid</option>
          </select>
        </p>
        <input type="submit" />
      </form>
    </main>
  </body>
</html>
