<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample AirTable Submit Failed</title>
    <link rel="icon" href="data:," />
  </head>

  <body>
    <main>
      <h1>Submission Failed!</h1>
      <p id="errorMessage">
        There was an error submitting your form. Please try again later.
      </p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("error_message");

      if (raw) {
        try {
          // Decode and parse JSON
          const decoded = decodeURIComponent(raw);
          const data = JSON.parse(decoded);

          // Extract fields safely
          const type = data?.error?.type || "Unknown error";
          const message = data?.error?.message || "An unexpected error occurred.";

          // Sanitize to prevent HTML injection
          const sanitize = (str) =>
            str.replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));

          const safeType = sanitize(type);
          const safeMessage = sanitize(message);

          // Display the error
          document.getElementById("errorMessage").innerHTML =
            `<strong>${safeType}</strong><br>${safeMessage}`;
        } catch (err) {
          // Fallback if JSON parsing fails
          document.getElementById("errorMessage").textContent =
            "An error occurred, but the details could not be parsed.";
        }
      }
    </script>
  </body>
</html>
